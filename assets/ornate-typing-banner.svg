<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 430" role="img" aria-labelledby="title desc">
  <title id="title">Ornate Typing Banner</title>
  <desc id="desc">Unified black and gold medieval style banner with integrated ornament and animated introduction text.</desc>
  <defs>
    <linearGradient id="goldFrame" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7f5f2b"/>
      <stop offset="50%" stop-color="#e9cc7c"/>
      <stop offset="100%" stop-color="#7f5f2b"/>
    </linearGradient>
    <linearGradient id="goldLeaf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5df9c"/>
      <stop offset="100%" stop-color="#bc9750"/>
    </linearGradient>
    <linearGradient id="panelShade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020305"/>
      <stop offset="45%" stop-color="#040508"/>
      <stop offset="100%" stop-color="#020305"/>
    </linearGradient>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="2" seed="8" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.85 0 0 0 0 0.72 0 0 0 0 0.45 0 0 0 0.08 0"/>
    </filter>
    <pattern id="beadLine" patternUnits="userSpaceOnUse" width="28" height="10">
      <rect width="28" height="10" fill="#020203"/>
      <ellipse cx="14" cy="5" rx="8.8" ry="3.2" fill="url(#goldLeaf)"/>
    </pattern>
    <pattern id="vinePanel" patternUnits="userSpaceOnUse" width="320" height="88">
      <rect width="320" height="88" fill="#020203"/>
      <g stroke="url(#goldFrame)" fill="none" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round" opacity="0.96">
        <path d="M10 62 C36 62, 54 44, 47 29 C40 15, 23 17, 22 33 C21 43, 31 48, 40 44"/>
        <path d="M40 67 C82 66, 108 44, 112 24 C115 12, 106 7, 96 10 C87 13, 83 24, 88 32 C92 38, 101 39, 109 35"/>
        <path d="M86 65 C128 64, 145 43, 146 26 C147 15, 140 9, 131 12"/>
        <path d="M108 63 C142 62, 160 58, 170 45"/>
        <path d="M310 62 C284 62, 266 44, 273 29 C280 15, 297 17, 298 33 C299 43, 289 48, 280 44"/>
        <path d="M280 67 C238 66, 212 44, 208 24 C205 12, 214 7, 224 10 C233 13, 237 24, 232 32 C228 38, 219 39, 211 35"/>
        <path d="M234 65 C192 64, 175 43, 174 26 C173 15, 180 9, 189 12"/>
        <path d="M212 63 C178 62, 160 58, 150 45"/>
        <path d="M52 74 C70 70, 82 62, 89 52"/>
        <path d="M268 74 C250 70, 238 62, 231 52"/>
      </g>
      <g fill="url(#goldLeaf)" opacity="0.98">
        <path d="M139 30 C151 12, 169 12, 181 30 C170 43, 151 43, 139 30 Z"/>
        <path d="M151 50 C160 37, 171 37, 180 50 C170 58, 160 58, 151 50 Z"/>
        <path d="M130 52 C138 42, 148 42, 156 52 C146 58, 138 59, 130 52 Z"/>
        <path d="M164 52 C172 42, 182 42, 190 52 C182 59, 174 58, 164 52 Z"/>
      </g>
      <circle cx="160" cy="34" r="2.5" fill="#e9cc7c"/>
      <circle cx="160" cy="53" r="1.9" fill="#d5b168"/>
    </pattern>
    <clipPath id="line1Clip">
      <rect x="250" y="170" width="0" height="58">
        <animate
          attributeName="width"
          begin="0s"
          dur="3000ms"
          fill="freeze"
          values="0;0;1100;1100"
          keyTimes="0;0;0.83333333333333;1"/>
      </rect>
    </clipPath>
    <clipPath id="line2Clip">
      <rect x="250" y="224" width="0" height="54">
        <animate
          attributeName="width"
          begin="0s"
          dur="6000ms"
          fill="freeze"
          values="0;0;1100;1100"
          keyTimes="0;0.5;0.91666666666667;1"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="1600" height="430" fill="#8f6c33"/>
  <rect x="16" y="16" width="1568" height="398" fill="#020305"/>
  <rect x="16" y="16" width="1568" height="398" filter="url(#grain)"/>
  <rect x="16" y="16" width="1568" height="2.2" fill="#f0d78f"/>
  <rect x="16" y="411.8" width="1568" height="2.2" fill="#f0d78f"/>

  <rect x="28" y="24" width="1544" height="12" fill="url(#beadLine)"/>
  <rect x="28" y="40" width="1544" height="2.2" fill="url(#goldFrame)"/>
  <rect x="28" y="44" width="1544" height="76" fill="url(#vinePanel)"/>
  <rect x="28" y="122" width="1544" height="2.2" fill="#e9cc7c"/>

  <rect x="28" y="308" width="1544" height="2.2" fill="#e9cc7c"/>
  <rect x="28" y="312" width="1544" height="76" fill="url(#vinePanel)"/>
  <rect x="28" y="390" width="1544" height="2.2" fill="url(#goldFrame)"/>
  <rect x="28" y="396" width="1544" height="12" fill="url(#beadLine)"/>

  <rect x="28" y="134" width="1544" height="162" fill="url(#panelShade)"/>
  <rect x="40" y="146" width="1520" height="138" fill="#010204"/>
  <rect x="40" y="146" width="1520" height="138" fill="none" stroke="#e2c476" stroke-width="1"/>

  <g opacity="0.42">
    <path d="M280 214 C338 184, 392 184, 450 214" stroke="#9d7635" stroke-width="1.7" fill="none"/>
    <path d="M1350 214 C1292 184, 1238 184, 1180 214" stroke="#9d7635" stroke-width="1.7" fill="none"/>
  </g>

  <g transform="translate(118,215)">
    <circle r="35" fill="none" stroke="url(#goldFrame)" stroke-width="2"/>
    <circle r="27" fill="none" stroke="#e8cb7b" stroke-width="1.3" opacity="0.9"/>
    <g fill="url(#goldLeaf)" stroke="#c79f5b" stroke-width="0.8">
      <path d="M0 -20 C10 -20, 14 -10, 0 -4 C-14 -10, -10 -20, 0 -20 Z"/>
      <path d="M20 0 C20 10, 10 14, 4 0 C10 -14, 20 -10, 20 0 Z"/>
      <path d="M0 20 C-10 20, -14 10, 0 4 C14 10, 10 20, 0 20 Z"/>
      <path d="M-20 0 C-20 -10, -10 -14, -4 0 C-10 14, -20 10, -20 0 Z"/>
      <circle cx="0" cy="0" r="5.4" fill="#e9cc7c"/>
    </g>
  </g>

  <g transform="translate(1482,215)">
    <circle r="35" fill="none" stroke="url(#goldFrame)" stroke-width="2"/>
    <circle r="27" fill="none" stroke="#e8cb7b" stroke-width="1.3" opacity="0.9"/>
    <g fill="url(#goldLeaf)" stroke="#c79f5b" stroke-width="0.8">
      <path d="M0 -20 C10 -20, 14 -10, 0 -4 C-14 -10, -10 -20, 0 -20 Z"/>
      <path d="M20 0 C20 10, 10 14, 4 0 C10 -14, 20 -10, 20 0 Z"/>
      <path d="M0 20 C-10 20, -14 10, 0 4 C14 10, 10 20, 0 20 Z"/>
      <path d="M-20 0 C-20 -10, -10 -14, -4 0 C-10 14, -20 10, -20 0 Z"/>
      <circle cx="0" cy="0" r="5.4" fill="#e9cc7c"/>
    </g>
  </g>

  <text
    x="800"
    y="201"
    fill="#e7c56d"
    font-family="'Noto Serif JP','Yu Mincho','Hiragino Mincho ProN',serif"
    font-size="58"
    dominant-baseline="middle"
    text-anchor="middle"
    letter-spacing="0"
    clip-path="url(#line1Clip)">
    ごきげんよう！クラインです〜
  </text>
  <text
    x="800"
    y="251"
    fill="#ddb968"
    font-family="'Noto Serif JP','Yu Mincho','Hiragino Mincho ProN',serif"
    font-size="52"
    dominant-baseline="middle"
    text-anchor="middle"
    letter-spacing="0"
    clip-path="url(#line2Clip)">
    東京で働いてるシステムエンジニアです。
  </text>
</svg>
