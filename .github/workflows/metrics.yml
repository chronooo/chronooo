name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Main profile metrics
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          filename: github-metrics.svg
          config_timezone: Asia/Tokyo
          repositories_affiliations: owner, collaborator, organization_member
          plugin_repositories: yes
          plugin_repositories_pinned: 6
          plugin_repositories_affiliations: owner, collaborator, organization_member

      - name: Language metrics
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          filename: github-metrics-languages.svg
          base: ""
          config_timezone: Asia/Tokyo
          plugin_languages: yes

      - name: Isometric calendar metrics
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          filename: github-metrics-isocalendar.svg
          base: ""
          config_timezone: Asia/Tokyo
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: Recently starred metrics
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          filename: github-metrics-stars.svg
          base: ""
          config_timezone: Asia/Tokyo
          plugin_stars: yes
          plugin_stars_limit: 4
